name: Registry Validation

on:
  pull_request:
    paths:
      - 'registry/hooks/**'
      - 'registry/scripts/**'
      - 'packages/schema/src/**'

jobs:
  validate:
    name: Validate & Rebuild Index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate all hook.json files
        run: pnpm run validate-all

      - name: Rebuild archives
        run: pnpm run build-archives

      - name: Rebuild index.json
        run: pnpm run build-index

      - name: Check generated files are up to date
        run: |
          if ! git diff --quiet registry/; then
            echo "registry/ has uncommitted changes — run 'pnpm run build-archives && pnpm run build-index' and commit the results"
            git diff --stat registry/
            exit 1
          fi
