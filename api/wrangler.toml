name = "hookpm-api"
main = "dist/index.js"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "HOOKPM_BUCKET"
bucket_name = "hookpm-registry"
preview_bucket_name = "hookpm-registry-preview"

[env.production]
name = "hookpm-api"

[env.staging]
name = "hookpm-api-staging"

[[env.staging.r2_buckets]]
binding = "HOOKPM_BUCKET"
bucket_name = "hookpm-registry-preview"
