name = "hookpm-api"
main = "dist/index.js"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "HOOKPM_BUCKET"
bucket_name = "hookpm-registry"
preview_bucket_name = "hookpm-registry-preview"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_NAMESPACE_PREVIEW_ID"

# Secrets (set via `wrangler secret put`):
#   CLERK_PUBLIC_KEY      — Clerk JWKS public key for JWT verification
#   CLERK_OAUTH_URL       — Clerk OAuth authorize URL
#   SUPABASE_URL          — Supabase project URL (https://<project>.supabase.co)
#   SUPABASE_SERVICE_KEY  — Supabase service role key (read/write access)

[env.production]
name = "hookpm-api"

[env.staging]
name = "hookpm-api-staging"

[[env.staging.r2_buckets]]
binding = "HOOKPM_BUCKET"
bucket_name = "hookpm-registry-preview"
